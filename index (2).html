<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארנק שוברים</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
        html, body { height: 100%; width: 100%; }
        body { font-family: 'Heebo', sans-serif; background: #000; color: #fff; overflow: hidden; }

        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000 0%, #0a0a0a 100%); z-index: 1000; }

        .auth-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 48px 32px; max-width: 380px; width: 90%; }

        .auth-box h1 { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; text-align: center; }

        .auth-form { display: flex; flex-direction: column; gap: 16px; }

        .auth-form input { padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Heebo'; font-size: 15px; }

        .auth-form input:focus { outline: none; background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.5); }

        .auth-form button { padding: 14px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 15px; }

        .auth-form button:hover { background: #00dd77; }

        .auth-toggle { text-align: center; font-size: 13px; color: #999; margin-top: 8px; }

        .auth-toggle a { color: #00ff88; cursor: pointer; }

        #registerForm { display: none; }

        #appScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; }

        .header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: flex-start; }

        .header h1 { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }

        .balance-label { font-size: 12px; color: #888; margin-bottom: 4px; }

        .balance-display { font-size: 28px; font-weight: 900; }

        .header-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; }

        .header-btn:hover { background: rgba(255,255,255,0.15); }

        .content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: 100px; }

        .search-box { margin-bottom: 24px; }

        .search-box input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Heebo'; font-size: 14px; }

        .search-box input:focus { outline: none; background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.5); }

        .vouchers-list { display: grid; gap: 12px; }

        .voucher-item { background: rgba(255,255,255,0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 16px; position: relative; }

        .voucher-item:hover { background: rgba(255,255,255,0.08); }

        .voucher-logo { font-size: 36px; flex-shrink: 0; }

        .voucher-info { flex: 1; text-align: right; }

        .voucher-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }

        .voucher-category { font-size: 12px; color: #888; }

        .voucher-balance { font-weight: 900; font-size: 18px; color: #00ff88; margin-bottom: 8px; }

        .voucher-expiry { font-size: 12px; padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; display: inline-block; }

        .voucher-expiry.soon { background: rgba(255,170,0,0.2); color: #ffaa00; }

        .voucher-expiry.expired { background: rgba(255,68,68,0.2); color: #ff4444; }

        .voucher-delete { position: absolute; top: 12px; left: 12px; background: rgba(255,68,68,0.2); border: none; color: #ff6666; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px; opacity: 0; }

        .voucher-item:hover .voucher-delete { opacity: 1; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding-bottom: 16px; }

        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #666; font-size: 12px; }

        .nav-item.active { color: #00ff88; }

        .fab { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; background: #00ff88; border-radius: 50%; border: none; color: #000; font-size: 32px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,255,136,0.4); z-index: 50; }

        .fab:hover { transform: translateX(-50%) scale(1.1); }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; justify-content: center; }

        .modal.active { display: flex; }

        .modal-content { width: 100%; max-width: 600px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 24px 24px 0 0; padding: 32px 24px 24px; max-height: 85vh; overflow-y: auto; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

        .modal-header h2 { font-size: 24px; font-weight: 900; }

        .modal-close { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

        .form-group { margin-bottom: 20px; }

        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #888; margin-bottom: 8px; }

        .form-group input, .form-group select { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Heebo'; font-size: 14px; }

        .form-group input:focus, .form-group select:focus { outline: none; background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.5); }

        .form-actions { display: flex; gap: 12px; margin-top: 32px; }

        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; font-family: 'Heebo'; }

        .btn-primary { background: #00ff88; color: #000; }

        .btn-primary:hover { background: #00dd77; }

        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }

        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        #checkoutScreen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }

        #checkoutScreen.active { display: flex; }

        .checkout-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

        .checkout-center { text-align: center; max-width: 400px; }

        .checkout-logo { font-size: 100px; margin-bottom: 24px; }

        .checkout-name { font-size: 32px; font-weight: 900; margin-bottom: 8px; }

        .checkout-category { font-size: 14px; color: #888; margin-bottom: 48px; }

        .barcode-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; margin-bottom: 32px; }

        .barcode-code { background: #fff; color: #000; padding: 16px; border-radius: 8px; font-weight: 700; font-size: 18px; font-family: monospace; margin-bottom: 16px; }

        .balance-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 24px; }

        .balance-label-text { font-size: 12px; color: #888; margin-bottom: 8px; }

        .balance-amount { font-size: 42px; font-weight: 900; color: #00ff88; margin-bottom: 8px; }

        .balance-total-text { font-size: 12px; color: #888; }

        .redeem-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; max-width: 300px; margin: 0 auto; }

        .redeem-box input { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-size: 16px; font-family: 'Heebo'; text-align: center; margin-bottom: 12px; }

        .empty-state { text-align: center; padding: 80px 24px; color: #666; }

        .empty-state-icon { font-size: 64px; margin-bottom: 16px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="authScreen">
        <div class="auth-box">
            <h1>ארנק שוברים</h1>
            
            <div class="auth-form" id="loginForm">
                <input type="email" id="loginEmail" placeholder="אימייל">
                <input type="password" id="loginPassword" placeholder="סיסמה">
                <button onclick="app.login()">התחבר</button>
                <div class="auth-toggle">אין חשבון? <a onclick="app.switchForm('register')">הירשם</a></div>
            </div>

            <div class="auth-form" id="registerForm">
                <input type="email" id="regEmail" placeholder="אימייל">
                <input type="password" id="regPass" placeholder="סיסמה">
                <input type="password" id="regPass2" placeholder="אימות סיסמה">
                <button onclick="app.register()">הירשם</button>
                <div class="auth-toggle">יש לך חשבון? <a onclick="app.switchForm('login')">התחבר</a></div>
            </div>
        </div>
    </div>

    <div id="appScreen">
        <div class="header">
            <div>
                <h1>ארנק שוברים</h1>
                <div class="balance-label">סך הכל זמין</div>
                <div class="balance-display" id="totalBalance">₪0</div>
            </div>
            <button class="header-btn" onclick="app.logout()">התנתק</button>
        </div>

        <div class="content">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="חפש שובר..." onkeyup="app.filter()">
            </div>
            <div class="vouchers-list" id="vouchersList"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">📱 בית</div>
            <div class="nav-item">📊 פעילות</div>
            <div class="nav-item">⚙️ הגדרות</div>
        </div>

        <button class="fab" onclick="app.openAdd()">+</button>

        <div class="modal" id="addModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>הוסף שובר</h2>
                    <button class="modal-close" onclick="app.closeAdd()">×</button>
                </div>
                <div class="form-group">
                    <label>שם החנות *</label>
                    <input type="text" id="brandInput" placeholder="פוקס, קסטרו וכו'">
                </div>
                <div class="form-group">
                    <label>קטגוריה</label>
                    <select id="categoryInput">
                        <option value="">בחר</option>
                        <option value="אופנה">אופנה</option>
                        <option value="מסעדות">מסעדות</option>
                        <option value="קניות">קניות</option>
                        <option value="פנאי">פנאי</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>סכום (₪) *</label>
                    <input type="number" id="amountInput" placeholder="500" min="1">
                </div>
                <div class="form-group">
                    <label>תאריך תפוגה *</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label>קוד (אופציונלי)</label>
                    <input type="text" id="codeInput">
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="app.closeAdd()">ביטול</button>
                    <button class="btn btn-primary" onclick="app.addVoucher()">הוסף</button>
                </div>
            </div>
        </div>

        <div id="checkoutScreen">
            <button class="checkout-close" onclick="app.closeCheckout()">×</button>
            <div class="checkout-center">
                <div class="checkout-logo" id="checkoutLogo">🏪</div>
                <div class="checkout-name" id="checkoutName">שובר</div>
                <div class="checkout-category" id="checkoutCat"></div>
                <div class="barcode-box">
                    <div class="barcode-code" id="checkoutCode">קוד</div>
                    <svg width="100" height="40" viewBox="0 0 100 40">
                        <rect width="100" height="40" fill="white"/>
                        <text x="50" y="22" text-anchor="middle" fill="black" font-size="12">[QR]</text>
                    </svg>
                </div>
                <div class="balance-box">
                    <div class="balance-label-text">יתרה נוכחית</div>
                    <div class="balance-amount" id="checkoutBal">₪0</div>
                    <div class="balance-total-text" id="checkoutTotal">מתוך ₪0</div>
                </div>
                <div class="redeem-box">
                    <input type="number" id="redeemInput" placeholder="כמה הוצא?" min="1">
                    <button class="btn btn-primary" onclick="app.redeem()" style="width: 100%;">עדכן יתרה</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✅ בדיקה שסופהבייס נטען
        if (!window.supabase) {
            console.error('❌ Supabase לא נטען');
            alert('❌ בעיה בטעינת Supabase. רענן את הדף.');
        }

        // ✅ יצירת אובייקט אפליקציה אחד
        const app = {
            db: null,
            user: null,
            vouchers: [],
            checkoutId: null,

            init() {
                // ✅ צור Supabase client פעם אחת
                this.db = window.supabase.createClient(
                    'https://kgjdapoetwbtbqwplxka.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnamRhcG9ldHdidGJxd3BseGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTUyMzgsImV4cCI6MjA4ODg5MTIzOH0.3Gq9VoNVLA2sCfpNEPDBpXdiaE1WllFmDD1gGfjuYJU'
                );

                // ✅ בדוק אם משתמש כבר מחובר
                this.db.auth.getSession().then(({ data }) => {
                    if (data?.session) {
                        this.user = data.session.user;
                        this.showApp();
                        this.loadVouchers();
                    }
                });

                // ✅ האזן לשינויים בהתחברות
                this.db.auth.onAuthStateChange((event, session) => {
                    if (session) {
                        this.user = session.user;
                        this.showApp();
                        this.loadVouchers();
                    } else {
                        this.user = null;
                    }
                });
            },

            async login() {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) { alert('מלא את כל השדות'); return; }

                const { error } = await this.db.auth.signInWithPassword({ email, password: pass });
                if (error) { alert('שגיאה: ' + error.message); return; }
            },

            async register() {
                const email = document.getElementById('regEmail').value;
                const pass = document.getElementById('regPass').value;
                const pass2 = document.getElementById('regPass2').value;
                if (!email || !pass || !pass2) { alert('מלא את כל השדות'); return; }
                if (pass !== pass2) { alert('הסיסמאות לא תואמות'); return; }

                const { error } = await this.db.auth.signUp({ email, password: pass });
                if (error) { alert('שגיאה: ' + error.message); return; }
                alert('✅ הרישום הצליח! התחבר עכשיו.');
                this.switchForm('login');
            },

            async logout() {
                await this.db.auth.signOut();
                location.reload();
            },

            switchForm(form) {
                document.getElementById('loginForm').style.display = form === 'login' ? 'flex' : 'none';
                document.getElementById('registerForm').style.display = form === 'register' ? 'flex' : 'none';
            },

            showApp() {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
            },

            async loadVouchers() {
                if (!this.user) return;
                const { data, error } = await this.db
                    .from('vouchers')
                    .select('*')
                    .eq('user_id', this.user.id)
                    .order('created_at', { ascending: false });

                if (error) { console.error(error); return; }
                this.vouchers = data || [];
                this.render();

                // Real-time
                this.db.channel(`user-${this.user.id}`)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'vouchers', filter: `user_id=eq.${this.user.id}` }, () => this.loadVouchers())
                    .subscribe();
            },

            async addVoucher() {
                const brand = document.getElementById('brandInput').value;
                const amt = parseFloat(document.getElementById('amountInput').value);
                const date = document.getElementById('dateInput').value;
                const cat = document.getElementById('categoryInput').value;
                const code = document.getElementById('codeInput').value;

                if (!brand || !amt || !date) { alert('מלא שדות חובה'); return; }

                const { error } = await this.db.from('vouchers').insert([{
                    user_id: this.user.id,
                    brand_name: brand,
                    category: cat || 'קניות',
                    original_value: amt,
                    current_balance: amt,
                    expiry_date: date,
                    code: code || null,
                    tags: []
                }]);

                if (error) { alert('שגיאה: ' + error.message); return; }
                this.closeAdd();
                this.loadVouchers();
            },

            async deleteVoucher(id) {
                if (!confirm('האם אתה בטוח?')) return;
                const { error } = await this.db.from('vouchers').delete().eq('id', id);
                if (error) { alert('שגיאה'); return; }
                this.loadVouchers();
            },

            async redeem() {
                const amt = parseFloat(document.getElementById('redeemInput').value);
                if (!amt || amt <= 0) { alert('הזן סכום'); return; }

                const v = this.vouchers.find(x => x.id === this.checkoutId);
                if (!v) return;

                const newBal = Math.max(0, v.current_balance - amt);
                const { error } = await this.db.from('vouchers').update({ current_balance: newBal }).eq('id', this.checkoutId);
                if (error) { alert('שגיאה'); return; }

                alert(`✅ עדכן! יתרה חדשה: ₪${newBal}`);
                this.closeCheckout();
                this.loadVouchers();
            },

            openAdd() { document.getElementById('addModal').classList.add('active'); },

            closeAdd() {
                document.getElementById('addModal').classList.remove('active');
                document.getElementById('brandInput').value = '';
                document.getElementById('amountInput').value = '';
                document.getElementById('dateInput').value = '';
                document.getElementById('codeInput').value = '';
                document.getElementById('categoryInput').value = '';
            },

            openCheckout(id) {
                const v = this.vouchers.find(x => x.id === id);
                if (!v) return;
                this.checkoutId = id;
                document.getElementById('checkoutLogo').textContent = '🏪';
                document.getElementById('checkoutName').textContent = v.brand_name;
                document.getElementById('checkoutCat').textContent = v.category;
                document.getElementById('checkoutCode').textContent = v.code || 'ללא קוד';
                document.getElementById('checkoutBal').textContent = `₪${v.current_balance}`;
                document.getElementById('checkoutTotal').textContent = `מתוך ₪${v.original_value}`;
                document.getElementById('redeemInput').value = '';
                document.getElementById('checkoutScreen').classList.add('active');
            },

            closeCheckout() {
                document.getElementById('checkoutScreen').classList.remove('active');
                this.checkoutId = null;
            },

            filter() {
                const q = document.getElementById('searchInput').value.toLowerCase();
                document.querySelectorAll('.voucher-item').forEach(el => {
                    const name = el.querySelector('.voucher-name')?.textContent.toLowerCase();
                    el.style.display = name?.includes(q) ? 'flex' : 'none';
                });
            },

            daysTo(date) {
                const d = new Date(date);
                const now = new Date();
                return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
            },

            getExpiry(date) {
                const d = this.daysTo(date);
                if (d < 0) return 'פג תוקף';
                if (d === 0) return 'היום';
                if (d === 1) return 'מחר';
                return `${d} ימים`;
            },

            getExpiryClass(date) {
                const d = this.daysTo(date);
                if (d < 0) return 'expired';
                if (d >= 0 && d <= 7) return 'soon';
                return '';
            },

            render() {
                const total = this.vouchers.reduce((s, v) => s + v.current_balance, 0);
                document.getElementById('totalBalance').textContent = `₪${total}`;

                const list = document.getElementById('vouchersList');
                if (this.vouchers.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>אין שוברים עדיין</div></div>';
                    return;
                }

                list.innerHTML = this.vouchers
                    .sort((a, b) => new Date(a.expiry_date) - new Date(b.expiry_date))
                    .map(v => `
                        <div class="voucher-item" onclick="app.openCheckout('${v.id}')">
                            <button class="voucher-delete" onclick="event.stopPropagation(); app.deleteVoucher('${v.id}')">🗑️</button>
                            <div class="voucher-logo">🏪</div>
                            <div class="voucher-info">
                                <div class="voucher-balance">₪${v.current_balance}</div>
                                <div class="voucher-name">${v.brand_name}</div>
                                <div class="voucher-category">${v.category}</div>
                            </div>
                            <div class="voucher-expiry ${this.getExpiryClass(v.expiry_date)}">${this.getExpiry(v.expiry_date)}</div>
                        </div>
                    `)
                    .join('');
            }
        };

        // ✅ הנח את האפליקציה כשהדף נטוען
        app.init();
