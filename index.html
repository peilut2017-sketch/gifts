<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארנק שוברים - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap');
        html, body { height: 100%; width: 100%; }
        body { font-family: 'Heebo', sans-serif; background: #000; color: #fff; overflow: hidden; }

        .sidebar { position: fixed; top: 0; left: 0; width: 250px; height: 100%; background: #0a0a0a; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; padding: 24px; display: none; z-index: 999; }

        .sidebar.active { display: flex; flex-direction: column; }

        .sidebar h3 { font-size: 18px; font-weight: 900; margin-bottom: 24px; background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .sidebar-item { padding: 12px 16px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 13px; }

        .sidebar-item:hover, .sidebar-item.active { background: rgba(0,255,136,0.2); border-color: #00ff88; }

        .sidebar-spacer { flex: 1; }

        .sidebar-logout { background: rgba(255,68,68,0.2); color: #ff6666; border: 1px solid rgba(255,68,68,0.3); }

        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #000 0%, #0a0a0a 100%); z-index: 1000; }

        .auth-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 48px 32px; max-width: 380px; width: 90%; }

        .auth-box h1 { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; text-align: center; }

        .auth-form { display: flex; flex-direction: column; gap: 16px; }

        .auth-form input { padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Heebo'; font-size: 15px; }

        .auth-form input:focus { outline: none; background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.5); }

        .auth-form button { padding: 14px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 15px; }

        .auth-form button:hover { background: #00dd77; }

        .auth-toggle { text-align: center; font-size: 13px; color: #999; margin-top: 8px; }

        .auth-toggle a { color: #00ff88; cursor: pointer; }

        #registerForm { display: none; }

        #appScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; }

        .header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; gap: 24px; background: rgba(0,0,0,0.5); }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .menu-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 18px; }

        .header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #00ff88 0%, #00ffff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .header-right { display: flex; gap: 12px; align-items: center; }

        .admin-badge { background: rgba(255,170,0,0.2); color: #ffaa00; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; }

        .header-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        .header-btn:hover { background: rgba(255,255,255,0.15); }

        .content { flex: 1; overflow-y: auto; padding: 24px; margin-left: 0; transition: margin-left 0.3s; }

        .content.sidebar-open { margin-left: 250px; }

        .tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

        .tab { padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.3s; }

        .tab:hover, .tab.active { background: rgba(0,255,136,0.2); border-color: #00ff88; }

        .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }

        .search-box { flex: 1; min-width: 200px; }

        .search-box input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Heebo'; font-size: 14px; }

        .search-box input:focus { outline: none; background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.5); }

        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; font-family: 'Heebo'; transition: all 0.3s; }

        .btn-primary { background: #00ff88; color: #000; }

        .btn-primary:hover { background: #00dd77; }

        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }

        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .btn-danger { background: rgba(255,68,68,0.2); color: #ff6666; }

        .btn-danger:hover { background: rgba(255,68,68,0.3); }

        .vouchers-list { display: grid; gap: 12px; }

        .voucher-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 16px; position: relative; transition: all 0.3s; }

        .voucher-item:hover { background: rgba(255,255,255,0.08); }

        .voucher-checkbox { width: 20px; height: 20px; cursor: pointer; }

        .voucher-info { flex: 1; text-align: right; }

        .voucher-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }

        .voucher-category { font-size: 12px; color: #888; }

        .voucher-balance { font-weight: 900; font-size: 18px; color: #00ff88; margin-bottom: 8px; }

        .voucher-expiry { font-size: 12px; padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; display: inline-block; }

        .voucher-expiry.soon { background: rgba(255,170,0,0.2); color: #ffaa00; }

        .voucher-expiry.expired { background: rgba(255,68,68,0.2); color: #ff4444; }

        .voucher-actions { display: flex; gap: 8px; }

        .icon-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }

        .icon-btn:hover { background: rgba(255,255,255,0.15); }

        .icon-btn.danger { background: rgba(255,68,68,0.2); color: #ff6666; }

        .icon-btn.danger:hover { background: rgba(255,68,68,0.3); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; }

        .stat-value { font-size: 32px; font-weight: 900; color: #00ff88; margin-bottom: 8px; }

        .stat-label { font-size: 12px; color: #888; }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; justify-content: center; }

        .modal.active { display: flex; }

        .modal-content { width: 100%; max-width: 600px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 24px 24px 0 0; padding: 32px 24px 24px; max-height: 85vh; overflow-y: auto; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

        .modal-header h2 { font-size: 24px; font-weight: 900; }

        .modal-close { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }

        .form-group { margin-bottom: 20px; }

        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #888; margin-bottom: 8px; }

        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Heebo'; font-size: 14px; }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; background: rgba(255,255,255,0.08); border-color: rgba(0,255,136,0.5); }

        .form-actions { display: flex; gap: 12px; margin-top: 32px; }

        .empty-state { text-align: center; padding: 80px 24px; color: #666; }

        .empty-state-icon { font-size: 64px; margin-bottom: 16px; }

        .badge { display: inline-block; padding: 4px 12px; background: rgba(0,255,136,0.2); color: #00ff88; border-radius: 6px; font-size: 11px; font-weight: 700; }

        .badge.warning { background: rgba(255,170,0,0.2); color: #ffaa00; }

        .badge.danger { background: rgba(255,68,68,0.2); color: #ff6666; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <!-- AUTH SCREEN -->
    <div id="authScreen">
        <div class="auth-box">
            <h1>ארנק שוברים PRO</h1>
            
            <div class="auth-form" id="loginForm">
                <input type="email" id="loginEmail" placeholder="אימייל">
                <input type="password" id="loginPassword" placeholder="סיסמה">
                <button onclick="app.login()">התחבר</button>
                <div class="auth-toggle">אין חשבון? <a onclick="app.switchForm('register')">הירשם</a></div>
            </div>

            <div class="auth-form" id="registerForm">
                <input type="email" id="regEmail" placeholder="אימייל">
                <input type="password" id="regPass" placeholder="סיסמה">
                <input type="password" id="regPass2" placeholder="אימות סיסמה">
                <button onclick="app.register()">הירשם</button>
                <div class="auth-toggle">יש לך חשבון? <a onclick="app.switchForm('login')">התחבר</a></div>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h3>תפריט</h3>
        <div class="sidebar-item active" onclick="app.switchTab('dashboard')">📊 דשבורד</div>
        <div class="sidebar-item" onclick="app.switchTab('my-vouchers')">🏪 שוברים שלי</div>
        <div class="sidebar-item" onclick="app.switchTab('statistics')">📈 סטטיסטיקה</div>
        <div id="adminSection" style="display: none;">
            <hr style="margin: 16px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
            <div style="font-size: 11px; color: #888; margin-bottom: 12px; text-transform: uppercase;">ניהול</div>
            <div class="sidebar-item" onclick="app.switchTab('admin-dashboard')">👨‍💼 ניהול מרכזי</div>
            <div class="sidebar-item" onclick="app.switchTab('all-vouchers')">🔑 כל השוברים</div>
            <div class="sidebar-item" onclick="app.switchTab('users')">👥 משתמשים</div>
            <div class="sidebar-item" onclick="app.switchTab('import')">📥 יבוא</div>
        </div>
        <div class="sidebar-spacer"></div>
        <div class="sidebar-item sidebar-logout" onclick="app.logout()">התנתק</div>
    </div>

    <!-- APP SCREEN -->
    <div id="appScreen">
        <div class="header">
            <div class="header-left">
                <button class="menu-btn" onclick="app.toggleSidebar()">☰</button>
                <h1 id="pageTitle">דשבורד</h1>
            </div>
            <div class="header-right">
                <div id="adminBadge" class="admin-badge" style="display: none;">🔑 מנהל מערכת</div>
                <button class="header-btn" onclick="app.logout()">התנתק</button>
            </div>
        </div>

        <div class="content" id="content">
            <!-- DASHBOARD TAB -->
            <div id="tab-dashboard" class="tab-content">
                <div class="stats-grid" id="dashboardStats"></div>
                <h2 style="margin-bottom: 16px;">שוברים קרובים לפקיעה</h2>
                <div class="vouchers-list" id="expiringVouchers"></div>
            </div>

            <!-- MY VOUCHERS TAB -->
            <div id="tab-my-vouchers" class="tab-content" style="display: none;">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" placeholder="חפש שובר..." onkeyup="app.filter()">
                    </div>
                    <button class="btn btn-primary" onclick="app.openAddModal()">+ הוסף שובר</button>
                </div>
                <div class="vouchers-list" id="myVouchersList"></div>
            </div>

            <!-- STATISTICS TAB -->
            <div id="tab-statistics" class="tab-content" style="display: none;">
                <div class="stats-grid" id="statsGrid"></div>
                <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; margin-top: 24px;">
                    <h3 style="margin-bottom: 16px;">ניתוח שוברים</h3>
                    <div id="statsAnalysis"></div>
                </div>
            </div>

            <!-- ADMIN DASHBOARD -->
            <div id="tab-admin-dashboard" class="tab-content" style="display: none;">
                <div class="stats-grid" id="adminStats"></div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-top: 24px;">
                    <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px;">
                        <h4 style="margin-bottom: 16px;">פעולות מהירות</h4>
                        <button class="btn btn-primary" style="width: 100%; margin-bottom: 8px;" onclick="app.openAddModal()">הוסף שובר</button>
                        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 8px;" onclick="app.switchTab('import')">יבוא בקבוצה</button>
                        <button class="btn btn-secondary" style="width: 100%;" onclick="app.exportCSV()">ייצוא CSV</button>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px;">
                        <h4 style="margin-bottom: 16px;">התראות</h4>
                        <div id="adminAlerts"></div>
                    </div>
                </div>
            </div>

            <!-- ALL VOUCHERS -->
            <div id="tab-all-vouchers" class="tab-content" style="display: none;">
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" placeholder="חפש שובר..." onkeyup="app.filter()">
                    </div>
                    <select onchange="app.filterByStatus(this.value)" style="padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-family: 'Heebo';">
                        <option value="">הכל</option>
                        <option value="active">פעיל</option>
                        <option value="expiring">קרוב לפוג</option>
                        <option value="expired">פג תוקף</option>
                    </select>
                    <button class="btn btn-primary" onclick="app.openAddModal()">+ הוסף שובר</button>
                </div>
                <div class="vouchers-list" id="allVouchersList"></div>
            </div>

            <!-- USERS TAB -->
            <div id="tab-users" class="tab-content" style="display: none;">
                <div id="usersList"></div>
            </div>

            <!-- IMPORT TAB -->
            <div id="tab-import" class="tab-content" style="display: none;">
                <div style="max-width: 600px;">
                    <h3 style="margin-bottom: 16px;">יבוא שוברים מ-CSV</h3>
                    <textarea id="csvInput" placeholder="עתק את הנתונים כאן:&#10;שם,קטגוריה,סכום,תאריך" style="width: 100%; height: 200px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: monospace; font-size: 12px; margin-bottom: 16px;"></textarea>
                    <button class="btn btn-primary" onclick="app.importCSV()">📥 יבא נתונים</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">הוסף שובר</h2>
                <button class="modal-close" onclick="app.closeAddModal()">×</button>
            </div>
            <div class="form-group">
                <label>שם החנות *</label>
                <input type="text" id="brandInput" placeholder="פוקס, קסטרו וכו'">
            </div>
            <div class="form-group">
                <label>קטגוריה</label>
                <select id="categoryInput">
                    <option value="">בחר</option>
                    <option value="אופנה">אופנה</option>
                    <option value="מסעדות">מסעדות</option>
                    <option value="קניות">קניות</option>
                    <option value="פנאי">פנאי</option>
                </select>
            </div>
            <div class="form-group">
                <label>סכום (₪) *</label>
                <input type="number" id="amountInput" placeholder="500" min="1">
            </div>
            <div class="form-group">
                <label>תאריך תפוגה *</label>
                <input type="date" id="dateInput">
            </div>
            <div class="form-group">
                <label>קוד (אופציונלי)</label>
                <input type="text" id="codeInput">
            </div>
            <div id="userSelect" style="display: none;" class="form-group">
                <label>משתמש</label>
                <select id="userSelectDropdown"></select>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="app.closeAddModal()">ביטול</button>
                <button class="btn btn-primary" onclick="app.addVoucher()">שמור</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            db: null,
            user: null,
            isAdmin: false,
            allVouchers: [],
            allUsers: [],
            filteredVouchers: [],
            editingId: null,
            sidebarOpen: false,

            async init() {
                this.db = window.supabase.createClient(
                    'https://kgjdapoetwbtbqwplxka.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnamRhcG9ldHdidGJxd3BseGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTUyMzgsImV4cCI6MjA4ODg5MTIzOH0.3Gq9VoNVLA2sCfpNEPDBpXdiaE1WllFmDD1gGfjuYJU'
                );

                const { data } = await this.db.auth.getSession();
                if (data?.session) {
                    this.user = data.session.user;
                    await this.checkAdminStatus();
                    this.showApp();
                    this.loadData();
                }

                this.db.auth.onAuthStateChange((event, session) => {
                    if (session) {
                        this.user = session.user;
                        this.checkAdminStatus();
                        this.showApp();
                        this.loadData();
                    } else {
                        this.user = null;
                    }
                });
            },

            async checkAdminStatus() {
                // ✅ בדוק אם המשתמש הוא Admin
                const { data, error } = await this.db
                    .from('vouchers')
                    .select('is_admin')
                    .eq('user_id', this.user.id)
                    .single();

                if (data?.is_admin) {
                    this.isAdmin = true;
                    document.getElementById('adminBadge').style.display = 'block';
                    document.getElementById('adminSection').style.display = 'block';
                } else {
                    document.getElementById('adminSection').style.display = 'none';
                }
            },

            async loadData() {
                if (this.isAdmin) {
                    await this.loadAllVouchers();
                    await this.loadAllUsers();
                } else {
                    await this.loadMyVouchers();
                }
                this.renderDashboard();
            },

            async loadMyVouchers() {
                const { data } = await this.db
                    .from('vouchers')
                    .select('*')
                    .eq('user_id', this.user.id)
                    .order('created_at', { ascending: false });

                this.allVouchers = data || [];
                this.filteredVouchers = [...this.allVouchers];
            },

            async loadAllVouchers() {
                const { data } = await this.db
                    .from('vouchers')
                    .select('*')
                    .order('created_at', { ascending: false });

                this.allVouchers = data || [];
                this.filteredVouchers = [...this.allVouchers];
            },

            async loadAllUsers() {
                const { data } = await this.db.auth.admin.listUsers();
                this.allUsers = data?.users || [];
                this.renderUsers();
            },

            login() {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPassword').value;
                if (!email || !pass) { alert('מלא את כל השדות'); return; }

                this.db.auth.signInWithPassword({ email, password: pass }).then(({ error }) => {
                    if (error) alert('שגיאה: ' + error.message);
                });
            },

            register() {
                const email = document.getElementById('regEmail').value;
                const pass = document.getElementById('regPass').value;
                const pass2 = document.getElementById('regPass2').value;
                if (!email || !pass || !pass2) { alert('מלא את כל השדות'); return; }
                if (pass !== pass2) { alert('הסיסמאות לא תואמות'); return; }

                this.db.auth.signUp({ email, password: pass }).then(({ error }) => {
                    if (error) { alert('שגיאה: ' + error.message); return; }
                    alert('✅ הרישום הצליח! התחבר עכשיו.');
                    this.switchForm('login');
                });
            },

            logout() {
                this.db.auth.signOut();
                location.reload();
            },

            switchForm(form) {
                document.getElementById('loginForm').style.display = form === 'login' ? 'flex' : 'none';
                document.getElementById('registerForm').style.display = form === 'register' ? 'flex' : 'none';
            },

            showApp() {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
            },

            toggleSidebar() {
                this.sidebarOpen = !this.sidebarOpen;
                document.getElementById('sidebar').classList.toggle('active');
                document.getElementById('content').classList.toggle('sidebar-open');
            },

            switchTab(tabName) {
                document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
                document.getElementById('tab-' + tabName)?.style.display = 'block';

                const titles = {
                    'dashboard': 'דשבורד',
                    'my-vouchers': 'שוברים שלי',
                    'statistics': 'סטטיסטיקה',
                    'admin-dashboard': 'ניהול מרכזי',
                    'all-vouchers': 'כל השוברים',
                    'users': 'משתמשים',
                    'import': 'יבוא'
                };
                document.getElementById('pageTitle').textContent = titles[tabName] || 'תפריט';

                if (tabName === 'dashboard') this.renderDashboard();
                if (tabName === 'admin-dashboard') this.renderAdminDashboard();
                if (tabName === 'statistics') this.renderStatistics();
                if (tabName === 'my-vouchers') this.renderMyVouchers();
                if (tabName === 'all-vouchers') this.renderAllVouchers();
            },

            async addVoucher() {
                const brand = document.getElementById('brandInput').value;
                const amt = parseFloat(document.getElementById('amountInput').value);
                const date = document.getElementById('dateInput').value;
                const cat = document.getElementById('categoryInput').value;
                const code = document.getElementById('codeInput').value;
                const userId = this.isAdmin ? document.getElementById('userSelectDropdown').value : this.user.id;

                if (!brand || !amt || !date) { alert('מלא שדות חובה'); return; }

                if (this.editingId) {
                    const { error } = await this.db.from('vouchers').update({
                        brand_name: brand,
                        category: cat || 'קניות',
                        original_value: amt,
                        expiry_date: date,
                        code: code || null
                    }).eq('id', this.editingId);

                    if (error) { alert('שגיאה'); return; }
                    this.editingId = null;
                } else {
                    const { error } = await this.db.from('vouchers').insert([{
                        user_id: userId,
                        brand_name: brand,
                        category: cat || 'קניות',
                        original_value: amt,
                        current_balance: amt,
                        expiry_date: date,
                        code: code || null,
                        tags: [],
                        is_admin: this.isAdmin ? 1 : 0
                    }]);

                    if (error) { alert('שגיאה: ' + error.message); return; }
                }

                this.closeAddModal();
                this.loadData();
            },

            async deleteVoucher(id) {
                if (!confirm('האם אתה בטוח?')) return;
                const { error } = await this.db.from('vouchers').delete().eq('id', id);
                if (error) { alert('שגיאה'); return; }
                this.loadData();
            },

            openAddModal() {
                document.getElementById('modalTitle').textContent = 'הוסף שובר';
                document.getElementById('userSelect').style.display = this.isAdmin ? 'block' : 'none';
                
                if (this.isAdmin) {
                    const select = document.getElementById('userSelectDropdown');
                    select.innerHTML = this.allUsers.map(u => `<option value="${u.id}">${u.email}</option>`).join('');
                }

                document.getElementById('addModal').classList.add('active');
            },

            closeAddModal() {
                document.getElementById('addModal').classList.remove('active');
                document.getElementById('brandInput').value = '';
                document.getElementById('amountInput').value = '';
                document.getElementById('dateInput').value = '';
                document.getElementById('codeInput').value = '';
                document.getElementById('categoryInput').value = '';
                this.editingId = null;
            },

            filter() {
                const q = document.getElementById('searchInput')?.value.toLowerCase() || '';
                this.filteredVouchers = this.allVouchers.filter(v => 
                    v.brand_name.toLowerCase().includes(q)
                );
                this.renderMyVouchers();
                this.renderAllVouchers();
            },

            filterByStatus(status) {
                if (!status) { this.filteredVouchers = [...this.allVouchers]; return; }

                const now = new Date();
                this.filteredVouchers = this.allVouchers.filter(v => {
                    const daysLeft = Math.ceil((new Date(v.expiry_date) - now) / (1000 * 60 * 60 * 24));
                    if (status === 'active') return daysLeft > 7;
                    if (status === 'expiring') return daysLeft >= 0 && daysLeft <= 7;
                    if (status === 'expired') return daysLeft < 0;
                });
            },

            daysTo(date) {
                const d = new Date(date);
                const now = new Date();
                return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
            },

            getExpiry(date) {
                const d = this.daysTo(date);
                if (d < 0) return 'פג תוקף';
                if (d === 0) return 'היום';
                if (d === 1) return 'מחר';
                return `${d} ימים`;
            },

            getExpiryClass(date) {
                const d = this.daysTo(date);
                if (d < 0) return 'expired';
                if (d >= 0 && d <= 7) return 'soon';
                return '';
            },

            renderDashboard() {
                const expiringIn7 = this.allVouchers.filter(v => {
                    const d = this.daysTo(v.expiry_date);
                    return d >= 0 && d <= 7;
                });

                const total = this.allVouchers.reduce((s, v) => s + v.current_balance, 0);
                const count = this.allVouchers.length;

                document.getElementById('dashboardStats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">₪${total}</div>
                        <div class="stat-label">סה"כ יתרה</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">שוברים כ"ס</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${expiringIn7.length}</div>
                        <div class="stat-label">קרובים לפוג</div>
                    </div>
                `;

                document.getElementById('expiringVouchers').innerHTML = expiringIn7.length === 0 
                    ? '<div class="empty-state">אין שוברים קרובים לפוג</div>'
                    : expiringIn7.map(v => this.renderVoucherCard(v)).join('');
            },

            renderAdminDashboard() {
                const totalVal = this.allVouchers.reduce((s, v) => s + v.original_value, 0);
                const usedVal = this.allVouchers.reduce((s, v) => s + (v.original_value - v.current_balance), 0);

                document.getElementById('adminStats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${this.allVouchers.length}</div>
                        <div class="stat-label">שוברים בסך הכל</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">₪${totalVal}</div>
                        <div class="stat-label">ערך כולל</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">₪${usedVal}</div>
                        <div class="stat-label">בשימוש</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${this.allUsers.length}</div>
                        <div class="stat-label">משתמשים</div>
                    </div>
                `;

                const expiring = this.allVouchers.filter(v => {
                    const d = this.daysTo(v.expiry_date);
                    return d >= 0 && d <= 7;
                });

                document.getElementById('adminAlerts').innerHTML = `
                    <div style="padding: 12px; background: rgba(255,170,0,0.2); border-left: 3px solid #ffaa00; border-radius: 4px; margin-bottom: 8px;">
                        <strong>${expiring.length}</strong> שוברים קרובים לפוג
                    </div>
                    <div style="padding: 12px; background: rgba(255,68,68,0.2); border-left: 3px solid #ff6666; border-radius: 4px;">
                        <strong>${this.allVouchers.filter(v => this.daysTo(v.expiry_date) < 0).length}</strong> שוברים פגי תוקף
                    </div>
                `;
            },

            renderStatistics() {
                const byCategory = {};
                this.allVouchers.forEach(v => {
                    byCategory[v.category] = (byCategory[v.category] || 0) + v.original_value;
                });

                const html = Object.entries(byCategory).map(([cat, val]) => 
                    `<div style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span>${cat || 'ללא קטגוריה'}</span>
                        <strong>₪${val}</strong>
                    </div>`
                ).join('');

                document.getElementById('statsAnalysis').innerHTML = html;
            },

            renderMyVouchers() {
                const html = this.filteredVouchers.length === 0
                    ? '<div class="empty-state"><div class="empty-state-icon">📭</div><div>אין שוברים</div></div>'
                    : this.filteredVouchers.map(v => this.renderVoucherCard(v, true)).join('');
                document.getElementById('myVouchersList').innerHTML = html;
            },

            renderAllVouchers() {
                const html = this.filteredVouchers.length === 0
                    ? '<div class="empty-state"><div class="empty-state-icon">📭</div><div>אין שוברים</div></div>'
                    : this.filteredVouchers.map(v => this.renderVoucherCard(v, this.isAdmin)).join('');
                document.getElementById('allVouchersList').innerHTML = html;
            },

            renderVoucherCard(v, showActions = false) {
                return `
                    <div class="voucher-item">
                        <div class="voucher-info">
                            <div class="voucher-balance">₪${v.current_balance}</div>
                            <div class="voucher-name">${v.brand_name}</div>
                            <div class="voucher-category">${v.category}</div>
                        </div>
                        <div class="voucher-expiry ${this.getExpiryClass(v.expiry_date)}">${this.getExpiry(v.expiry_date)}</div>
                        ${showActions ? `<div class="voucher-actions">
                            <button class="icon-btn" onclick="app.editVoucher('${v.id}')">✏️</button>
                            <button class="icon-btn danger" onclick="app.deleteVoucher('${v.id}')">🗑️</button>
                        </div>` : ''}
                    </div>
                `;
            },

            editVoucher(id) {
                const v = this.allVouchers.find(x => x.id === id);
                if (!v) return;
                this.editingId = id;
                document.getElementById('modalTitle').textContent = 'ערוך שובר';
                document.getElementById('brandInput').value = v.brand_name;
                document.getElementById('amountInput').value = v.original_value;
                document.getElementById('dateInput').value = v.expiry_date;
                document.getElementById('codeInput').value = v.code || '';
                document.getElementById('categoryInput').value = v.category;
                document.getElementById('addModal').classList.add('active');
            },

            renderUsers() {
                const html = this.allUsers.map(u => `
                    <div style="padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 12px;">
                        <div style="font-weight: 700; margin-bottom: 4px;">${u.email}</div>
                        <div style="font-size: 12px; color: #888;">מצטרף: ${new Date(u.created_at).toLocaleDateString('he-IL')}</div>
                    </div>
                `).join('');
                document.getElementById('usersList').innerHTML = html;
            },

            exportCSV() {
                const headers = ['שם', 'קטגוריה', 'סכום', 'יתרה', 'תאריך תפוגה'];
                const rows = this.allVouchers.map(v => [
                    v.brand_name,
                    v.category,
                    v.original_value,
                    v.current_balance,
                    v.expiry_date
                ]);

                const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `vouchers-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            },

            importCSV() {
                const text = document.getElementById('csvInput').value;
                if (!text) { alert('הדבק נתונים'); return; }

                const lines = text.split('\n').slice(1);
                const vouchers = lines.filter(l => l.trim()).map(line => {
                    const [name, cat, amt, date] = line.split(',').map(s => s.trim());
                    return {
                        user_id: this.user.id,
                        brand_name: name,
                        category: cat,
                        original_value: parseFloat(amt),
                        current_balance: parseFloat(amt),
                        expiry_date: date,
                        code: null,
                        tags: [],
                        is_admin: this.isAdmin ? 1 : 0
                    };
                });

                this.db.from('vouchers').insert(vouchers).then(({ error }) => {
                    if (error) { alert('שגיאה'); return; }
                    alert(`✅ יובאו ${vouchers.length} שוברים`);
                    document.getElementById('csvInput').value = '';
                    this.loadData();
                });
            }
        };

        app.init();
    </script>
</body>
</html>
